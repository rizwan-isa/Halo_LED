# CSV Bom Output - RI 03/09/2024
kibot:
  version: 1

outputs:
  - name: generic_bom_csv
    # For details on configuring see https://kibot.readthedocs.io/en/latest/configuration/outputs/bom.html
    comment: Generic Bill of Materials in CSV format
    type: bom
    dir: "BoMs"
    options:
      format: CSV
      group_fields: ["Value", "Footprint", "MPN"]
      columns:
        [
          Row,
          Quantity Per PCB,
          Value,
          References,
          MPN,
          DKPN,
          DKLink,
          Datasheet,
          Description,
          LCSC PN,
        ]
      count_smd_tht: true
      #exclude_filter: '_mechanical'

  - name: generic_oneline_bom_csv
    # For details on configuring see https://kibot.readthedocs.io/en/latest/configuration/outputs/bom.html
    comment: Generic Bill of Materials in CSV format Oneline
    type: bom
    dir: "BoMs"
    options:
      format: CSV
      output: "%f_%r_%i_oneline.%x"
      group_fields: []
      columns:
        [
          Row,
          Quantity Per PCB,
          Value,
          References,
          MPN,
          DKPN,
          Description,
          LCSC PN,
        ]
      count_smd_tht: true
      #exclude_filter: '_mechanical'
